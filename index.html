<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>畫布工具</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #1a1a2e;
    display: flex;
    height: 100vh;
    overflow: hidden;
    color: #e0e0e0;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 72px;
    background: #16213e;
    border-right: 1px solid #0f3460;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 0;
    gap: 4px;
    z-index: 10;
    box-shadow: 2px 0 12px rgba(0,0,0,.4);
    overflow-y: auto;
    overflow-x: hidden;
  }
  #sidebar::-webkit-scrollbar { width: 3px; }
  #sidebar::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

  .sidebar-label {
    font-size: 9px;
    letter-spacing: .06em;
    color: #4a5568;
    text-transform: uppercase;
    margin: 8px 0 2px;
    width: 100%;
    text-align: center;
  }

  .tool-btn {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: #a0aec0;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 9px;
    transition: background .15s, color .15s, transform .1s;
    position: relative;
  }
  .tool-btn svg { width: 20px; height: 20px; }
  .tool-btn:hover { background: #0f3460; color: #e0e0e0; }
  .tool-btn.active { background: #e94560; color: #fff; }
  .tool-btn:active { transform: scale(.93); }
  .tool-btn:disabled { opacity: .3; cursor: not-allowed; }
  .tool-btn:disabled:hover { background: transparent; color: #a0aec0; }

  .divider {
    width: 36px;
    height: 1px;
    background: #0f3460;
    margin: 6px 0;
    flex-shrink: 0;
  }

  /* Color picker */
  #colorWrap {
    position: relative;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #colorPicker {
    position: absolute;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }
  #colorSwatch {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #000000;
    border: 3px solid #4a5568;
    pointer-events: none;
    transition: border-color .2s;
    box-shadow: 0 0 0 1px #0f3460;
  }
  #colorWrap:hover #colorSwatch { border-color: #e94560; }

  /* Size slider */
  #sizeWrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 4px 0;
  }
  #sizeWrap span { font-size: 9px; color: #4a5568; }
  #brushSize {
    -webkit-appearance: none;
    width: 44px;
    height: 4px;
    border-radius: 2px;
    background: #0f3460;
    outline: none;
    cursor: pointer;
  }
  #brushSize::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e94560;
    cursor: pointer;
  }
  #sizePreview {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #sizeCircle {
    border-radius: 50%;
    background: #e0e0e0;
    transition: width .1s, height .1s;
  }

  /* Download & clear buttons */
  .action-btn {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 9px;
    transition: background .15s, transform .1s;
  }
  .action-btn:active { transform: scale(.93); }
  #downloadBtn { background: #1a4731; color: #68d391; }
  #downloadBtn:hover { background: #276749; }
  #clearBtn { background: #4a1942; color: #f687b3; }
  #clearBtn:hover { background: #702459; }

  /* ── Shape sub-panel ── */
  #shapePanel {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: #0d1a36;
    border-radius: 8px;
    padding: 4px 0;
    width: 100%;
  }
  #shapePanel.open { display: flex; }
  .shape-btn {
    width: 36px;
    height: 36px;
    border: 1px solid #0f3460;
    border-radius: 8px;
    background: transparent;
    color: #a0aec0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, color .15s;
  }
  .shape-btn:hover, .shape-btn.active { background: #e94560; color: #fff; border-color: #e94560; }
  .shape-btn svg { width: 18px; height: 18px; }

  /* ── Ratio panel ── */
  #ratioPanel {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: #0d1a36;
    border-radius: 8px;
    padding: 6px 4px;
    width: 64px;
  }
  #ratioPanel.open { display: flex; }
  .ratio-btn {
    width: 56px;
    height: 24px;
    border: 1px solid #0f3460;
    border-radius: 6px;
    background: transparent;
    color: #a0aec0;
    cursor: pointer;
    font-size: 9px;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    letter-spacing: .04em;
    transition: background .15s, color .15s;
  }
  .ratio-btn:hover { background: #0f3460; color: #e0e0e0; }
  .ratio-btn.active { background: #e94560; color: #fff; border-color: #e94560; }

  /* ── Canvas area ── */
  #canvasWrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #12101e;
    position: relative;
  }

  #mainCanvas {
    background: #ffffff;
    box-shadow: 0 8px 48px rgba(0,0,0,.6);
    display: block;
    cursor: crosshair;
  }

  /* Status bar */
  #statusBar {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(22,33,62,.85);
    border: 1px solid #0f3460;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    color: #4a5568;
    pointer-events: none;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="sidebar">

  <span class="sidebar-label">工具</span>

  <!-- Pen -->
  <button class="tool-btn active" id="btnPen" title="畫筆">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>
    </svg>
    畫筆
  </button>

  <!-- Eraser -->
  <button class="tool-btn" id="btnEraser" title="橡皮擦">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/>
      <path d="M22 21H7"/><path d="m5 11 9 9"/>
    </svg>
    橡皮擦
  </button>

  <!-- Line -->
  <button class="tool-btn" id="btnLine" title="直線">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="5" y1="19" x2="19" y2="5"/>
    </svg>
    直線
  </button>

  <!-- Shape toggle -->
  <button class="tool-btn" id="btnShape" title="圖形工具">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
      <circle cx="6.5" cy="17.5" r="3.5"/><rect x="14" y="14" width="7" height="7"/>
    </svg>
    圖形
  </button>

  <!-- Shape sub-panel -->
  <div id="shapePanel">
    <button class="shape-btn active" id="shapeRect" title="矩形">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="1"/></svg>
    </button>
    <button class="shape-btn" id="shapeCircle" title="橢圓">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="7"/></svg>
    </button>
  </div>

  <div class="divider"></div>
  <span class="sidebar-label">顏色</span>

  <!-- Color picker -->
  <div id="colorWrap" title="選擇顏色">
    <input type="color" id="colorPicker" value="#000000">
    <div id="colorSwatch"></div>
  </div>

  <div class="divider"></div>
  <span class="sidebar-label">粗細</span>

  <!-- Size -->
  <div id="sizeWrap">
    <div id="sizePreview"><div id="sizeCircle" style="width:4px;height:4px;"></div></div>
    <input type="range" id="brushSize" min="1" max="60" value="4">
    <span id="sizeLabel">4px</span>
  </div>

  <div class="divider"></div>
  <span class="sidebar-label">比例</span>

  <!-- Ratio toggle button -->
  <button class="tool-btn" id="btnRatio" title="畫布比例">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
    </svg>
    比例
  </button>

  <!-- Ratio sub-panel -->
  <div id="ratioPanel">
    <button class="ratio-btn active" data-w="9" data-h="16">9:16</button>
    <button class="ratio-btn" data-w="16" data-h="9">16:9</button>
    <button class="ratio-btn" data-w="21" data-h="9">21:9</button>
    <button class="ratio-btn" data-w="4" data-h="3">4:3</button>
    <button class="ratio-btn" data-w="3" data-h="4">3:4</button>
    <button class="ratio-btn" data-w="1" data-h="1">1:1</button>
  </div>

  <div class="divider"></div>
  <span class="sidebar-label">歷史</span>

  <!-- Undo -->
  <button class="tool-btn" id="btnUndo" title="返回 (Ctrl+Z)" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/>
    </svg>
    返回
  </button>

  <!-- Redo -->
  <button class="tool-btn" id="btnRedo" title="重做 (Ctrl+Y)" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3L21 13"/>
    </svg>
    重做
  </button>

  <div class="divider"></div>

  <!-- Download -->
  <button class="action-btn" id="downloadBtn" title="下載 PNG">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    下載
  </button>

  <!-- Clear -->
  <button class="action-btn" id="clearBtn" title="清除畫布">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
      <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
    </svg>
    清除
  </button>

</div>

<!-- Canvas -->
<div id="canvasWrap">
  <canvas id="mainCanvas"></canvas>
  <div id="statusBar">畫筆 · 4px · 9:16</div>
</div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const statusBar = document.getElementById('statusBar');
const btnUndo = document.getElementById('btnUndo');
const btnRedo = document.getElementById('btnRedo');

// ── History (undo/redo) ──
const MAX_HISTORY = 50;
let undoStack = [];  // ImageData[]
let redoStack = [];  // ImageData[]

function saveHistory() {
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack = [];
  updateHistoryButtons();
}

function updateHistoryButtons() {
  btnUndo.disabled = undoStack.length === 0;
  btnRedo.disabled = redoStack.length === 0;
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  ctx.putImageData(undoStack.pop(), 0, 0);
  updateHistoryButtons();
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  ctx.putImageData(redoStack.pop(), 0, 0);
  updateHistoryButtons();
}

btnUndo.addEventListener('click', undo);
btnRedo.addEventListener('click', redo);

// Keyboard shortcuts
window.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redo(); }
});

// ── Aspect ratio ──
let ratioW = 9, ratioH = 16;

function applyRatio(rw, rh, keepContent) {
  const areaW = wrap.clientWidth - 48;
  const areaH = wrap.clientHeight - 48;
  let cw, ch;
  if (areaW / areaH > rw / rh) {
    ch = areaH;
    cw = Math.floor(ch * rw / rh);
  } else {
    cw = areaW;
    ch = Math.floor(cw * rh / rw);
  }
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width; tmp.height = canvas.height;
  tmp.getContext('2d').drawImage(canvas, 0, 0);
  canvas.width = cw;
  canvas.height = ch;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, cw, ch);
  if (keepContent) ctx.drawImage(tmp, 0, 0);
}

// ── Ratio buttons ──
const ratioPanel = document.getElementById('ratioPanel');
document.getElementById('btnRatio').addEventListener('click', () => {
  ratioPanel.classList.toggle('open');
  document.getElementById('btnRatio').classList.toggle('active');
});

document.querySelectorAll('.ratio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const rw = parseInt(btn.dataset.w);
    const rh = parseInt(btn.dataset.h);
    if (rw === ratioW && rh === ratioH) return;
    if (!confirm(`切換畫布比例為 ${rw}:${rh}？\n畫布內容將會清除。`)) return;
    ratioW = rw; ratioH = rh;
    document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyRatio(ratioW, ratioH, false);
    undoStack = []; redoStack = [];
    updateHistoryButtons();
    updateStatus();
  });
});

// Initial setup
applyRatio(ratioW, ratioH, false);
window.addEventListener('resize', () => applyRatio(ratioW, ratioH, true));

// ── State ──
let tool = 'pen';
let shape = 'rect';
let drawing = false;
let lastX = 0, lastY = 0;
let startX = 0, startY = 0;
let snapshot = null;

const colorPicker = document.getElementById('colorPicker');
const colorSwatch = document.getElementById('colorSwatch');
const brushSize = document.getElementById('brushSize');
const sizeLabel = document.getElementById('sizeLabel');
const sizeCircle = document.getElementById('sizeCircle');

function getColor() { return tool === 'eraser' ? '#ffffff' : colorPicker.value; }
function getSize() { return parseInt(brushSize.value); }

function updateSizeUI() {
  const s = getSize();
  sizeLabel.textContent = s + 'px';
  const d = Math.min(s, 32);
  sizeCircle.style.width = d + 'px';
  sizeCircle.style.height = d + 'px';
}

colorPicker.addEventListener('input', () => { colorSwatch.style.background = colorPicker.value; });
brushSize.addEventListener('input', updateSizeUI);
updateSizeUI();

// ── Tool buttons ──
const toolMap = { btnPen:'pen', btnEraser:'eraser', btnLine:'line', btnShape:'shape' };
const toolNames = { pen:'畫筆', eraser:'橡皮擦', line:'直線', shape:'圖形' };
const shapePanel = document.getElementById('shapePanel');

Object.entries(toolMap).forEach(([id, t]) => {
  document.getElementById(id).addEventListener('click', () => {
    tool = t;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if (t === 'shape') { shapePanel.classList.toggle('open'); }
    else { shapePanel.classList.remove('open'); }
    if (ratioPanel.classList.contains('open')) document.getElementById('btnRatio').classList.add('active');
    updateHistoryButtons();
    updateStatus();
  });
});

document.getElementById('shapeRect').addEventListener('click', () => {
  shape = 'rect';
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('shapeRect').classList.add('active');
  updateStatus();
});
document.getElementById('shapeCircle').addEventListener('click', () => {
  shape = 'circle';
  document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('shapeCircle').classList.add('active');
  updateStatus();
});

function updateStatus() {
  const name = toolNames[tool] || tool;
  const extra = tool === 'shape' ? (shape === 'rect' ? ' · 矩形' : ' · 橢圓') : '';
  const u = undoStack.length, r = redoStack.length;
  const hist = u > 0 || r > 0 ? ` · ↩${u} ↪${r}` : '';
  statusBar.textContent = name + extra + ' · ' + getSize() + 'px · ' + ratioW + ':' + ratioH + hist;
}
brushSize.addEventListener('input', updateStatus);

// ── Canvas coords ──
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return [src.clientX - r.left, src.clientY - r.top];
}

// ── Draw helpers ──
function drawLine(x1,y1,x2,y2) {
  ctx.beginPath();
  ctx.moveTo(x1,y1);
  ctx.lineTo(x2,y2);
  ctx.strokeStyle = getColor();
  ctx.lineWidth = getSize();
  ctx.lineCap = 'round';
  ctx.stroke();
}

function drawShape(x1,y1,x2,y2) {
  ctx.putImageData(snapshot, 0, 0);
  ctx.beginPath();
  ctx.strokeStyle = getColor();
  ctx.lineWidth = getSize();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (shape === 'rect') {
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
  } else {
    const rx = Math.abs(x2-x1)/2, ry = Math.abs(y2-y1)/2;
    const cx = x1+(x2-x1)/2, cy = y1+(y2-y1)/2;
    ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI*2);
    ctx.stroke();
  }
}

// ── Events ──
function onStart(e) {
  e.preventDefault();
  drawing = true;
  [lastX, lastY] = getPos(e);
  startX = lastX; startY = lastY;
  // Save history BEFORE drawing stroke
  saveHistory();
  if (tool === 'line' || tool === 'shape') {
    snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
  }
  if (tool === 'pen' || tool === 'eraser') {
    ctx.beginPath();
    ctx.arc(lastX, lastY, getSize()/2, 0, Math.PI*2);
    ctx.fillStyle = getColor();
    ctx.fill();
  }
}

function onMove(e) {
  e.preventDefault();
  if (!drawing) return;
  const [x, y] = getPos(e);
  if (tool === 'pen' || tool === 'eraser') {
    drawLine(lastX, lastY, x, y);
    [lastX, lastY] = [x, y];
  } else if (tool === 'line') {
    ctx.putImageData(snapshot, 0, 0);
    drawLine(startX, startY, x, y);
  } else if (tool === 'shape') {
    drawShape(startX, startY, x, y);
  }
}

function onEnd(e) {
  e.preventDefault();
  if (!drawing) return;
  drawing = false;
  const src = e.changedTouches ? e.changedTouches[0] : e;
  const r = canvas.getBoundingClientRect();
  const x = src.clientX - r.left, y = src.clientY - r.top;
  if (tool === 'line') {
    ctx.putImageData(snapshot, 0, 0);
    drawLine(startX, startY, x, y);
  } else if (tool === 'shape') {
    drawShape(startX, startY, x, y);
  }
  updateStatus();
}

canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('mouseleave', onEnd);
canvas.addEventListener('touchstart', onStart, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onEnd, {passive:false});

// ── Clear ──
document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('確定要清除畫布嗎？')) return;
  saveHistory();
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  updateStatus();
});

// ── Download (iOS-friendly) ──
document.getElementById('downloadBtn').addEventListener('click', () => {
  const dataURL = canvas.toDataURL('image/png');
  const isIOS = /iP(hone|ad|od)/i.test(navigator.userAgent);
  if (isIOS) {
    const html = `<!DOCTYPE html>
<html lang="zh-TW"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>儲存圖片</title>
